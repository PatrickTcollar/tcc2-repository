          - text: "## Interpretação Clínica"
          - text: "A análise dos dados espirométricos do Paciente Sintético #01 revela uma função pulmonar dentro dos parâmetros de normalidade. Tanto os volumes pulmonares (CVF) quanto os fluxos expiratórios (VEF1) estão adequados para a idade e género do paciente. A ausência de redução na relação VEF1/CVF é um indicador crucial da inexistência de obstrução significativa nas vias aéreas."
          - text: Em resumo, o perfil espirométrico demonstra um padrão ventilatório normal, sem evidências de comprometimento obstrutivo ou restritivo da função pulmonar.
          - text: "## Recomendações"
          - text: Com base nos resultados de espirometria que indicam função pulmonar normal, recomenda-se a manutenção de hábitos de vida saudáveis e acompanhamento médico de rotina. Novas avaliações espirométricas deverão ser consideradas apenas em caso de surgimento de novos sintomas respiratórios ou conforme a evolução do quadro clínico geral do paciente.

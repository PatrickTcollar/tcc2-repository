          - text: "## Achados Principais"
          - text: "* A Capacidade Vital Forçada (CVF) e o Volume Expiratório Forçado no 1º segundo (VEF1) encontram-se dentro dos limites da normalidade, correspondendo a 101.7% e 101.3% dos valores previstos, respetivamente."
